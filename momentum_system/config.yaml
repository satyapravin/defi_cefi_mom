system:
  log_level: "INFO"
  heartbeat_interval_seconds: 60
  database_path: "data/events.db"
  mode: "live"

infrastructure:
  rpc_url: "wss://arb-mainnet.g.alchemy.com/v2/YOUR_KEY"
  chain_id: 42161
  block_confirmations: 1
  reconnect_delay_seconds: 5
  max_reconnect_attempts: 50

deribit:
  base_url: "https://www.deribit.com"
  ws_url: "wss://www.deribit.com/ws/api/v2"
  client_id: "${DERIBIT_CLIENT_ID}"
  client_secret: "${DERIBIT_CLIENT_SECRET}"

pairs:
  - name: "ETH-USDC"
    deribit_instrument: "ETH-PERPETUAL"
    token0: "0x82aF49447D8a07e3bd95BD0d56f35241523fBab1"
    token1: "0xaf88d065e77c8cC2239327C5EDb3A432268e5831"
    token0_decimals: 18
    token1_decimals: 6
    invert_price: false
    pools:
      bp30:
        address: "0xc473e2aEE3441BF9240Be85eb122aBB059A3B57c"
        fee: 3000
      bp5:
        address: "0xC6962004f452bE9203591991D15f6b388e09E8D0"
        fee: 500
      bp1:
        address: "0x6f38e884725a116c9c7fbf208e79fe8828a2595f"
        fee: 100
    bp30_signal:
      window_seconds: 120                   # 2 min lookback for 30bps swaps
      min_cluster_swaps: 3                  # need at least 3 swaps in window
      direction_ratio: 0.7                  # 70% weighted agreement = signal
      decay_alpha: 0.01                     # exp decay rate (half-life ~69s)
      bp5_coherence_window_seconds: 60      # BP5 cross-tier confirmation window
      bp5_coherence_min_events: 5           # min BP5 events for coherence
    execution:
      offset_base_bps: 2.0                  # 2 bps base offset
      offset_conviction_bps: 6.0            # widens at low conviction
      stale_order_seconds: 45               # cancel unfilled orders after 45s
      allow_reprice: false
      max_reprice_bps: 3.0
      post_only: true
    risk:
      max_position_usd: 50000
      max_position_contracts: 100
      stop_loss_bps: 40                     # 40 bps stop — above noise floor
      take_profit_bps: 40                   # 40 bps TP — symmetric R:R
      cooldown_seconds: 120                 # 2 min cooldown after loss
      daily_loss_limit_usd: 500
      max_open_orders: 3
      margin_usage_limit_pct: 50
      max_holding_seconds: 600              # force-exit after 10 min (aligned with alpha peak)
    regime:
      vol_window_seconds: 300               # 5 min rolling vol
      vol_quiet_threshold: 0.00004          # below = QUIET (calibrated to real BP5 vol)
      vol_chaotic_threshold: 0.00006        # above = CHAOTIC (calibrated to real BP5 vol)
      intensity_window_seconds: 60
      chaotic_multiplier: 0.3               # size multiplier in CHAOTIC
      active_multiplier: 1.5                # size multiplier in ACTIVE
      quiet_multiplier: 1.0                 # size multiplier in QUIET
      acf_window_events: 50                 # BP30 events for autocorrelation
      acf_trending_threshold: 0.15          # above = trending regime
      acf_mean_revert_threshold: -0.15      # below = mean-reverting regime
      acf_trending_multiplier: 1.3          # boost when momentum confirmed
      acf_mean_revert_multiplier: 0.3       # suppress when mean-reverting
